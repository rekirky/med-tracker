services:
  backend:
    image: ghcr.io/rekirky/med-tracker-backend:latest
    build: ./backend
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Australia/Brisbane
    restart: unless-stopped
    networks:
      - mednet
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    image: ghcr.io/rekirky/med-tracker-frontend:latest
    build: ./frontend
    ports:
      - "2346:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mednet
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
    restart: unless-stopped
    networks:
      - mednet

networks:
  mednet:
    driver: bridge
