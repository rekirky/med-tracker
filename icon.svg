<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

<defs>
  <clipPath id="medClip2">
    <rect x="0" y="0" width="300" height="300" rx="60" ry="60"/>
  </clipPath>
</defs>

<rect x="0" y="0" width="300" height="300" rx="60" ry="60" fill="#1e3a5f"/>

<g clip-path="url(#medClip2)">

  <circle cx="240" cy="40" r="140" fill="#1a3354"/>
  <circle cx="20" cy="290" r="110" fill="#162c47"/>

  <!-- Heartbeat / ECG line -->
  <polyline points="0,165 40,165 58,135 72,195 88,125 104,185 120,165 300,165"
    fill="none" stroke="#38bdf8" stroke-width="4.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Medical cross - white -->
  <rect x="132" y="48" width="36" height="100" rx="8" fill="#ffffff"/>
  <rect x="108" y="72" width="84" height="36" rx="8" fill="#ffffff"/>

  <!-- Pill -->
  <rect x="20" y="228" width="70" height="30" rx="15" fill="#818cf8"/>
  <rect x="20" y="228" width="35" height="30" rx="15" fill="#a5b4fc"/>

  <!-- Capsule -->
  <rect x="105" y="232" width="60" height="26" rx="13" fill="#34d399"/>
  <rect x="105" y="232" width="30" height="26" rx="13" fill="#6ee7b7"/>

  <!-- Sparkle dots -->
  <circle cx="230" cy="230" r="5" fill="#38bdf8" opacity="0.8"/>
  <circle cx="248" cy="248" r="3.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="220" cy="252" r="3" fill="#818cf8" opacity="0.7"/>

  <!-- Small plus accent top right -->
  <line x1="250" y1="68" x2="250" y2="88" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="78" x2="260" y2="78" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
  <circle cx="250" cy="78" r="3" fill="#bfdbfe"/>

</g>

</svg>
